<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="lotto-machine">
        <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">🌓</button>
        <h1>Lotto Number Generator</h1>
        <div class="numbers-display"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="contact-section">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mgoqwnne" method="POST">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" placeholder="문의 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">보내기</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
